<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <rect width="1200" height="600" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="600" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Auto Email Follow-up System — n8n Workflow</text>
  
  <!-- Schedule Trigger Node -->
  <rect x="60" y="220" width="120" height="80" rx="10" fill="#2d2d44" stroke="#ff6b35" stroke-width="2"/>
  <circle cx="120" cy="250" r="18" fill="#1a1a2e"/>
  <text x="120" y="256" font-family="Arial" font-size="14" fill="#4fc3f7" text-anchor="middle">⏰</text>
  <text x="120" y="285" font-family="Arial" font-size="11" fill="#cccccc" text-anchor="middle">Schedule</text>
  <text x="120" y="298" font-family="Arial" font-size="11" fill="#cccccc" text-anchor="middle">Trigger</text>
  
  <!-- Arrow 1 -->
  <line x1="180" y1="260" x2="220" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Get Messages Node -->
  <rect x="220" y="220" width="120" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="245" y="240" width="70" height="18" rx="3" fill="#4285f4"/>
  <text x="280" y="252" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">Gmail</text>
  <text x="280" y="278" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Get many</text>
  <text x="280" y="290" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">messages</text>
  
  <!-- Arrow 2 -->
  <line x1="340" y1="260" x2="380" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Edit Fields Node -->
  <rect x="380" y="220" width="120" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="440" y="256" font-family="Arial" font-size="22" fill="#7b68ee" text-anchor="middle">✏</text>
  <text x="440" y="278" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Edit Fields</text>
  
  <!-- Arrow 3 -->
  <line x1="500" y1="260" x2="540" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Code Node -->
  <rect x="540" y="220" width="120" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="600" y="256" font-family="Arial" font-size="18" fill="#ffd700" text-anchor="middle">{}</text>
  <text x="600" y="278" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Code in</text>
  <text x="600" y="290" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">JavaScript</text>
  
  <!-- Arrow 4 -->
  <line x1="660" y1="260" x2="700" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- If Node -->
  <rect x="700" y="220" width="80" height="80" rx="10" fill="#2d2d44" stroke="#4caf50" stroke-width="2"/>
  <text x="740" y="256" font-family="Arial" font-size="18" fill="#4caf50" text-anchor="middle">⬡</text>
  <text x="740" y="278" font-family="Arial" font-size="12" fill="#aaa" text-anchor="middle">If</text>
  
  <!-- Branch to urgent -->
  <line x1="780" y1="240" x2="860" y2="160" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Branch to question -->
  <line x1="780" y1="260" x2="860" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Branch to request -->
  <line x1="780" y1="280" x2="860" y2="360" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Reply URGENT -->
  <rect x="860" y="120" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="875" y="130" width="50" height="14" rx="3" fill="#4285f4"/>
  <text x="900" y="141" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">Gmail</text>
  <text x="930" y="155" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Reply URGENT</text>
  <text x="930" y="167" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">message</text>
  
  <!-- Arrow to mark urgent read -->
  <line x1="1000" y1="155" x2="1040" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1040" y="120" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="1110" y="155" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Mark urgent</text>
  <text x="1110" y="167" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">as read</text>
  
  <!-- Reply Question -->
  <rect x="860" y="220" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="875" y="230" width="50" height="14" rx="3" fill="#4285f4"/>
  <text x="900" y="241" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">Gmail</text>
  <text x="930" y="256" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Reply question</text>
  <text x="930" y="268" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">message</text>
  
  <line x1="1000" y1="255" x2="1040" y2="255" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1040" y="220" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="1110" y="255" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Mark question</text>
  <text x="1110" y="267" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">as read</text>
  
  <!-- Reply Request -->
  <rect x="860" y="320" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="875" y="330" width="50" height="14" rx="3" fill="#4285f4"/>
  <text x="900" y="341" font-family="Arial" font-size="8" fill="#fff" text-anchor="middle">Gmail</text>
  <text x="930" y="356" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Reply request</text>
  <text x="930" y="368" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">message</text>
  
  <line x1="1000" y1="355" x2="1040" y2="355" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1040" y="320" width="140" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="1110" y="355" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Mark request</text>
  <text x="1110" y="367" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">as read</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <text x="60" y="530" font-family="Arial" font-size="12" fill="#888">Built with n8n | Intelligent email classification with priority-based routing and automated follow-up management</text>
</svg>
